apiVersion: v1
kind: Namespace
metadata:
  name: code-graph

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: code-graph-sa
  namespace: code-graph
  annotations:
    azure.workload.identity/client-id: "${MANAGED_IDENTITY_CLIENT_ID}"
  labels:
    azure.workload.identity/use: "true"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-graph-chatbot
  namespace: code-graph
  labels:
    app: code-graph-chatbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: code-graph-chatbot
  template:
    metadata:
      labels:
        app: code-graph-chatbot
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: code-graph-sa
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: chatbot
        image: damoyacr.azurecr.io/code-graph-chatbot:v3
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: AZURE_OPENAI_ENDPOINT
          value: "https://damoy-openai3.openai.azure.com/"
        - name: AZURE_OPENAI_API_VERSION
          value: "2025-01-01-preview"
        - name: AZURE_DEPLOYMENT_NAME
          value: "gpt-4o"
        - name: AUTH_USERNAME
          valueFrom:
            secretKeyRef:
              name: codegraph-auth
              key: username
        - name: AUTH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: codegraph-auth
              key: password
        - name: GRAPH_PATH
          value: "output/code-graph-full.json"
        - name: INDEX_DB
          value: "output/file-index3.db"
        - name: REPO_ROOT
          value: "/data/kubernetes"
        - name: DOCS_ROOT
          value: "/data/docs"
        - name: DOCS_INDEX_DB
          value: "output/doc-index.db"
        - name: GITHUB_REPO_URL
          value: "https://github.com/kubernetes/kubernetes"
        - name: GITHUB_BRANCH
          value: "master"
        - name: DOCS_BASE_URL
          value: "https://kubernetes.io"
        - name: MAX_TOKENS
          value: "4000"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "2"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: code-graph-chatbot
  namespace: code-graph
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-resource-group: kube
spec:
  type: LoadBalancer
  loadBalancerIP: "172.202.0.104"
  selector:
    app: code-graph-chatbot
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
