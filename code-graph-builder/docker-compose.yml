version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION}
      - AZURE_DEPLOYMENT_NAME=${AZURE_DEPLOYMENT_NAME}
      - GRAPH_PATH=${GRAPH_PATH}
      - MAX_CONTEXT_ITEMS=${MAX_CONTEXT_ITEMS}
      - MAX_TOKENS=${MAX_TOKENS}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8000}
    volumes:
      - ./output:/app/output
    command: uvicorn src.chatbot_service:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # React dev server with hot reload (only starts with: docker compose --profile dev up)
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    profiles:
      - dev

networks:
  default:
    name: code-graph-network
