apiVersion: v1
kind: Namespace
metadata:
  name: codegraph

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: codegraph-chatbot
  namespace: codegraph
  labels:
    app: codegraph-chatbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codegraph-chatbot
  template:
    metadata:
      labels:
        app: codegraph-chatbot
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: codegraph-sa
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: chatbot
        image: damoyacr.azurecr.io/codegraph-chatbot:v1
        ports:
        - containerPort: 8000
        env:
        - name: AZURE_OPENAI_ENDPOINT
          value: "https://damoy-openai3.openai.azure.com/"
        - name: AZURE_OPENAI_API_VERSION
          value: "2025-01-01-preview"
        - name: AZURE_DEPLOYMENT_NAME
          value: "gpt-4o"
        - name: AUTH_USERNAME
          valueFrom:
            secretKeyRef:
              name: codegraph-auth
              key: username
        - name: AUTH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: codegraph-auth
              key: password
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: codegraph-chatbot
  namespace: codegraph
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-resource-group: kube
spec:
  type: LoadBalancer
  loadBalancerIP: "172.202.0.104"
  selector:
    app: codegraph-chatbot
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: codegraph-sa
  namespace: codegraph
  annotations:
    azure.workload.identity/client-id: "c5b23b23-d5bc-4a4c-aa2c-7f5a123d43f8"
  labels:
    azure.workload.identity/use: "true"
