apiVersion: batch/v1
kind: Job
metadata:
  name: code-graph-analysis
  namespace: default
spec:
  backoffLimit: 1
  template:
    spec:
      containers:
      - name: analyzer
        image: code-graph-builder:latest
        imagePullPolicy: Never
        command: 
          - python
          - main.py
          - analyze
          - --repo-root
          - /data/kubernetes
          - --pkg-dir
          - pkg/client
          - --output
          - /output/graph.json
        volumeMounts:
        - name: kubernetes-source
          mountPath: /data/kubernetes
          readOnly: true
        - name: output
          mountPath: /output
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
      volumes:
      - name: kubernetes-source
        hostPath:
          path: /mnt/kubernetes-source
          type: Directory
      - name: output
        emptyDir: {}
      restartPolicy: Never
---
apiVersion: v1
kind: Service
metadata:
  name: graph-api
  namespace: default
spec:
  selector:
    app: graph-api
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: LoadBalancer
