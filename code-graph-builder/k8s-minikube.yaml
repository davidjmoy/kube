apiVersion: v1
kind: Namespace
metadata:
  name: code-graph

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: analyzer-config
  namespace: code-graph
data:
  analysis-package: "pkg/client"

---
apiVersion: batch/v1
kind: Job
metadata:
  name: code-graph-analysis
  namespace: code-graph
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 1800  # 30 minutes
  ttlSecondsAfterFinished: 600  # Keep logs for 10 min after completion
  template:
    metadata:
      labels:
        app: code-graph-analysis
    spec:
      serviceAccountName: analyzer
      containers:
      - name: analyzer
        image: code-graph-builder:latest
        imagePullPolicy: Never  # For local Minikube testing
        command: 
          - sh
          - -c
          - |
            echo "Starting code graph analysis..."
            cd /app
            python main.py analyze \
              --repo-root /data/kubernetes \
              --pkg-dir pkg/client \
              --output /output/graph.json \
              --stats-output /output/stats.json || exit 1
            echo "Analysis complete"
            echo "=== RESULTS ==="
            cat /output/stats.json
            echo "=============="
            # Keep container alive to inspect results
            tail -f /dev/null
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        volumeMounts:
        - name: kubernetes-source
          mountPath: /data/kubernetes
          readOnly: true
        - name: output
          mountPath: /output
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2"
        livenessProbe:
          exec:
            command:
            - test
            - -f
            - /output/graph.json
          initialDelaySeconds: 30
          periodSeconds: 10
      
      volumes:
      - name: kubernetes-source
        hostPath:
          path: /mnt/kubernetes-source
          type: DirectoryOrCreate
      - name: output
        emptyDir: {}
      
      restartPolicy: Never

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: analyzer
  namespace: code-graph

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: analyzer
  namespace: code-graph
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: analyzer
  namespace: code-graph
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: analyzer
subjects:
- kind: ServiceAccount
  name: analyzer
  namespace: code-graph

---
apiVersion: v1
kind: Service
metadata:
  name: graph-api
  namespace: code-graph
spec:
  type: NodePort
  selector:
    app: code-graph-analysis
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
    nodePort: 30000
